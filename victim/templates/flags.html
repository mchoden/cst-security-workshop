{% extends "base.html" %}{% block content %}<div class="lab-header"><h1>🚩 Flag Checker</h1><p class="muted">Found a flag? Paste it here. {{ total }} flags total.</p></div><div class="flag-input-wrap"><input type="text" id="fi" placeholder="FLAG{...}" style="font-family:monospace"><button class="btn btn-green" onclick="checkFlag()">Check</button></div><div id="result"></div><div class="card" style="margin-top:24px"><h3>Scoreboard</h3><div id="board"></div></div>{% endblock %}{% block scripts %}<script>const C=[{l:"CORS",id:"cors_1",n:"Wildcard"},{l:"CORS",id:"cors_2",n:"Regex"},{l:"CORS",id:"cors_3",n:"Reflected+Creds"},{l:"CSRF",id:"csrf_1",n:"No Protection"},{l:"CSRF",id:"csrf_2",n:"Weak Token"},{l:"Auth",id:"auth_1",n:"Default Creds"},{l:"Auth",id:"auth_2",n:"JWT None"},{l:"Auth",id:"auth_3",n:"IDOR"},{l:"Auth",id:"auth_4",n:"Predictable Sessions"},{l:"Auth",id:"auth_5",n:"Role Escalation"},{l:"API",id:"api_1",n:"Hidden Endpoint"},{l:"API",id:"api_2",n:"Verb Tampering"},{l:"API",id:"api_3",n:"Mass Assignment"},{l:"SSRF",id:"ssrf_1",n:"Internal Access"},{l:"SSRF",id:"ssrf_2",n:"Path Discovery"},{l:"SSRF",id:"ssrf_3",n:"Cloud Metadata"},{l:"Micro",id:"micro_1",n:"No Service Auth"},{l:"Micro",id:"micro_2",n:"Debug Endpoint"},{l:"Micro",id:"micro_3",n:"Gateway Bypass"}];let S=JSON.parse(localStorage.getItem('s')||'{}');function render(){document.getElementById('board').innerHTML='<table style="width:100%;font-size:14px"><thead><tr style="color:var(--muted);text-align:left"><th style="padding:8px 0">Lab</th><th>Challenge</th><th style="text-align:center">Status</th></tr></thead><tbody>'+C.map(c=>'<tr style="border-top:1px solid var(--border)"><td style="padding:6px 0;color:var(--muted);font-size:12px;font-weight:600">'+c.l+'</td><td>'+c.n+'</td><td style="text-align:center;font-size:18px">'+(S[c.id]?'✅':'⬜')+'</td></tr>').join('')+'</tbody></table>'}async function checkFlag(){const f=document.getElementById('fi').value.trim();const r=await fetch('/flags/check',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({flag:f})});const d=await r.json();if(d.correct){document.getElementById('result').innerHTML='<div class="success-box">✅ '+d.message+'</div>';S[d.challenge]=true;localStorage.setItem('s',JSON.stringify(S));render()}else{document.getElementById('result').innerHTML='<div class="error-box">'+d.message+'</div>'}}document.getElementById('fi').addEventListener('keydown',e=>{if(e.key==='Enter')checkFlag()});render()</script>{% endblock %}
