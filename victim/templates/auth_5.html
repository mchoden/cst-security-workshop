{% extends "base.html" %}{% block content %}<div class="lab-header"><a href="/auth" class="back-link">← Back</a><h1>Level 5: JWT Role Escalation</h1><p class="muted">JWT uses a weak secret. Crack it, forge admin token.</p></div><div class="card"><h3>Login</h3><div style="display:flex;gap:8px;margin-top:12px"><input type="text" id="ju" value="alice" style="width:140px"><input type="password" id="jp" value="password123" style="width:140px"><button class="btn btn-sm" onclick="doLogin()">Login</button></div><div id="jout" class="code-block" style="display:none;margin-top:12px"></div></div><div class="card" style="margin-top:16px"><h3>Admin Panel</h3><div style="display:flex;gap:8px;margin-top:12px"><input type="text" id="forged" placeholder="Forged JWT" style="flex:1"><button class="btn btn-sm" onclick="tryAdmin()">Access</button></div><div id="aout" class="code-block" style="display:none;margin-top:12px"></div></div><details class="hint-box"><summary>Hint</summary><p>The secret is "secret". Go to jwt.io, change role to "admin", sign with "secret".</p></details>{% endblock %}{% block scripts %}<script>async function doLogin(){const r=await fetch('/auth/5/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('ju').value,password:document.getElementById('jp').value})});const d=await r.json();const e=document.getElementById('jout');e.style.display='block';e.textContent=d.token||d.error;if(d.token)document.getElementById('forged').value=d.token}async function tryAdmin(){const r=await fetch('/auth/5/admin-panel',{headers:{'Authorization':'Bearer '+document.getElementById('forged').value}});const d=await r.json();const e=document.getElementById('aout');e.style.display='block';e.textContent=JSON.stringify(d,null,2)}</script>{% endblock %}
