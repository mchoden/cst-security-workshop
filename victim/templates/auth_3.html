{% extends "base.html" %}{% block content %}<div class="lab-header"><a href="/auth" class="back-link">← Back</a><h1>Level 3: IDOR</h1><p class="muted">You're Bob (ID 3). API: <code>GET /auth/3/api/users/{id}</code></p></div><div class="card"><div style="display:flex;gap:8px;margin-top:12px"><input type="number" id="uid" value="3" style="width:120px"><button class="btn btn-sm" onclick="load()">Fetch</button></div><div id="out" class="code-block" style="display:none;margin-top:12px"></div></div><details class="hint-box"><summary>Hint</summary><p>Try user IDs 1, 2. Alice (ID 2) has something interesting.</p></details>{% endblock %}{% block scripts %}<script>async function load(){const r=await fetch('/auth/3/api/users/'+document.getElementById('uid').value);const d=await r.json();const e=document.getElementById('out');e.style.display='block';e.textContent=JSON.stringify(d,null,2)}</script>{% endblock %}
